<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대성 SKY 단어 테스트</title>
    <style>
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f9; color: #333; }
        .container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #1a365d; text-align: center; }
        
        input[type="text"], input[type="password"], select { width: 100%; padding: 15px; font-size: 16px; margin: 10px 0 20px 0; border: 2px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background-color: #2b6cb0; color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #1a365d; }
        button:disabled { background-color: #a0aec0; cursor: not-allowed; }

        .option-btn { background-color: white; color: #2d3748; border: 2px solid #e2e8f0; margin-bottom: 10px; text-align: left; transition: 0.2s; }
        .option-btn:hover { background-color: #edf2f7; border-color: #cbd5e0; }
        
        .option-btn.selected { background-color: #ebf8ff; border-color: #3182ce; color: #2b6cb0; font-weight: bold; }

        .progress { text-align: right; font-weight: bold; color: #718096; margin-bottom: 20px; }
        .question { font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 30px; color: #2b6cb0; }
        
        .nav-container { display: flex; gap: 10px; margin-top: 20px; }
        .nav-btn { flex: 1; padding: 12px; font-size: 16px; }
        .nav-prev { background-color: #718096; }
        .nav-prev:hover { background-color: #4a5568; }
        .submit-test-btn { background-color: #e53e3e; margin-top: 20px; }
        .submit-test-btn:hover { background-color: #c53030; }

        .wrong-list { margin-top: 20px; text-align: left; background: #fff5f5; padding: 20px; border-radius: 10px; border: 1px solid #feb2b2; }
        .wrong-item { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #feb2b2; }
        .wrong-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .w-question { font-weight: bold; font-size: 18px; color: #c53030; }
        .w-answer { color: #2f855a; font-weight: bold; }
        .w-picked { color: #718096; text-decoration: line-through; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="intro-screen">
        <h1 id="title-text">단어 테스트 준비</h1>
        
        <label><b>🙋‍♂️ 학생 이름</b></label>
        <input type="text" id="student-name" placeholder="이름을 입력하세요 (예: 홍길동)">

        <label><b>🔒 과목별 접속 암호</b></label>
        <input type="password" id="secret-pw" placeholder="비밀번호를 입력하세요">

        <label><b>📅 학습할 Day 선택</b></label>
        <select id="day-select">
            <option value="">데이터를 불러오는 중입니다...</option>
        </select>

        <label><b>🎯 시험 범위 선택</b></label>
        <select id="range-select">
            <option value="all">전체 풀기</option>
            <option value="half1">앞부분 절반 풀기</option>
            <option value="half2">뒷부분 절반 풀기</option>
        </select>

        <button id="start-btn" onclick="startTest()">시험 시작하기</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress" id="progress-text">1 / ?</div>
        <div class="question" id="question-text">한국어 뜻</div>
        <div id="options-area"></div>

        <div class="nav-container">
            <button id="prev-btn" class="nav-btn nav-prev" onclick="prevQuestion()">◀ 이전 문제</button>
            <button id="next-btn" class="nav-btn" onclick="nextQuestion()">다음 문제 ▶</button>
        </div>
        <button id="submit-btn" class="submit-test-btn hidden" onclick="endTest()">📤 시험 제출하기</button>
    </div>

    <div id="result-screen" class="hidden">
        <h2>시험 종료! 🎉</h2>
        <h1 id="score-text" style="font-size: 40px; color: #e53e3e; margin: 10px 0;">0점</h1>
        <p id="saving-msg" style="color: #3182ce; font-weight: bold;">성적을 서버에 전송하고 있습니다... ⏳</p>
        
        <div id="wrong-answers-container" class="wrong-list hidden">
            <h3 style="margin-top: 0; color: #c53030;">📝 틀린 단어 복습하기</h3>
            <div id="wrong-answers-list"></div>
        </div>

        <button onclick="location.href='index.html'" style="margin-top: 20px;">첫 화면으로 돌아가기</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzxJ085RNS9FsBUGAjwtVJsAswTqT7ZzV4qy5-mPjygedrWAY634Nq6eDt7XZYo4fYxIA/exec';
    
    // 🌟 과목별 암호화(Base64) 비밀번호 사전입니다!
    const subjectPasswords = {
        "토플": "ZHNza3k=",    
        "토익": "ZHNza3k=",  
        "SAT": "ZHNzYXQx",     
        "교과서": "ZHN0ZXh0MQ==",    
        "기본": "cGFzcw=="     // 위 목록에 없는 과목을 눌렀을 때의 기본 암호: pass
    };

    let allVocaData = [];
    let currentQuizData = []; 
    let currentIndex = 0;
    
    let studentName = "";
    let selectedDay = "";
    let selectedRange = "";
    let subjectType = "";

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        let typeParam = urlParams.get('type');

        if (typeParam === 'toefl') {
            subjectType = '토플';
        } else if (typeParam === 'toeic') {
            subjectType = '토익';
        } else if (typeParam) {
            subjectType = typeParam; 
        } else {
            subjectType = '토플'; 
        }

        document.getElementById('title-text').innerText = `${subjectType} 단어 테스트`;

        fetch(`${scriptURL}?action=getVoca&t=${new Date().getTime()}`)
        .then(res => res.json())
        .then(data => {
            allVocaData = data.filter(item => String(item.subject).trim() === String(subjectType).trim());
            
            let days = [...new Set(allVocaData.map(item => item.day))].sort((a,b) => a-b);
            let daySelect = document.getElementById('day-select');
            daySelect.innerHTML = "";
            days.forEach(d => {
                daySelect.innerHTML += `<option value="${d}">Day ${d}</option>`;
            });

            if(days.length === 0) {
                daySelect.innerHTML = "<option>등록된 단어가 없습니다.</option>";
                document.getElementById('start-btn').disabled = true;
            }
        });
    };

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startTest() {
        studentName = document.getElementById('student-name').value.trim();
        const enteredPw = document.getElementById('secret-pw').value;
        selectedDay = document.getElementById('day-select').value;
        const rangeVal = document.getElementById('range-select').value;

        if(!studentName) { alert("학생 이름을 입력해 주세요!"); return; }
        
        // 🌟 마법의 암호 확인 구간! 선택한 과목의 암호를 사전에서 꺼내옵니다.
        // 만약 사전에 등록되지 않은 새로운 과목이라면 "기본" 암호를 사용합니다.
        let correctHash = subjectPasswords[subjectType] || subjectPasswords["기본"];

        if(btoa(enteredPw) !== correctHash) {
            alert("❌ 비밀번호가 틀렸습니다. 학원/선생님께 문의하세요.");
            document.getElementById('secret-pw').value = ""; 
            document.getElementById('secret-pw').focus();
            return; 
        }

        let dayWords = allVocaData.filter(item => item.day === selectedDay);
        let midPoint = Math.ceil(dayWords.length / 2); 
        
        let rawData = [];
        if (rangeVal === 'half1') {
            rawData = dayWords.slice(0, midPoint); 
            selectedRange = "앞부분 절반";
        } else if (rangeVal === 'half2') {
            rawData = dayWords.slice(midPoint); 
            selectedRange = "뒷부분 절반";
        } else {
            rawData = dayWords;
            selectedRange = "전체";
        }

        if(rawData.length === 0) {
            alert("선택한 범위에 단어가 없습니다.");
            return;
        }

        currentQuizData = rawData.map(q => {
            let options = [
                { text: q.answer, isCorrect: true },
                { text: q.w1, isCorrect: false },
                { text: q.w2, isCorrect: false },
                { text: q.w3, isCorrect: false }
            ].filter(opt => opt.text && opt.text.trim() !== "undefined" && opt.text.trim() !== "");
            
            return {
                question: q.question,
                answer: q.answer,
                options: shuffleArray(options), 
                pickedText: null,               
                isCorrect: false                
            };
        });

        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        currentIndex = 0;
        renderQuiz();
    }

    function renderQuiz() {
        const q = currentQuizData[currentIndex];
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${currentQuizData.length}`;
        document.getElementById('question-text').innerText = q.question; 
        
        renderOptions(); 

        document.getElementById('prev-btn').disabled = (currentIndex === 0);
        
        if (currentIndex === currentQuizData.length - 1) {
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('submit-btn').classList.remove('hidden');
        } else {
            document.getElementById('next-btn').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
        }
    }

    function renderOptions() {
        const q = currentQuizData[currentIndex];
        const optionsArea = document.getElementById('options-area');
        optionsArea.innerHTML = "";
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            
            if (q.pickedText === opt.text) {
                btn.classList.add('selected');
            }
            
            btn.innerText = opt.text;
            btn.onclick = () => selectOption(opt.text, opt.isCorrect);
            optionsArea.appendChild(btn);
        });
    }

    function selectOption(pickedText, isCorrect) {
        currentQuizData[currentIndex].pickedText = pickedText;
        currentQuizData[currentIndex].isCorrect = isCorrect;
        
        renderOptions(); 

        if(currentIndex < currentQuizData.length - 1) {
            setTimeout(() => {
                nextQuestion();
            }, 300);
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuiz();
        }
    }

    function nextQuestion() {
        if (currentIndex < currentQuizData.length - 1) {
            currentIndex++;
            renderQuiz();
        }
    }

    function endTest() {
        let finalScore = currentQuizData.filter(q => q.isCorrect).length;
        let wrongAnswers = currentQuizData.filter(q => !q.isCorrect);

        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        const finalScoreText = `${finalScore} / ${currentQuizData.length}`;
        document.getElementById('score-text').innerText = finalScoreText;

        const wrongContainer = document.getElementById('wrong-answers-container');
        const wrongList = document.getElementById('wrong-answers-list');
        wrongList.innerHTML = "";

        if (wrongAnswers.length > 0) {
            wrongContainer.classList.remove('hidden');
            wrongAnswers.forEach(item => {
                let pickedDisp = item.pickedText ? item.pickedText : "선택 안 함 (빈칸)";
                wrongList.innerHTML += `
                    <div class="wrong-item">
                        <div class="w-question">Q. ${item.question}</div>
                        <div>정답: <span class="w-answer">${item.answer}</span></div>
                        <div>내가 고른 답: <span class="w-picked">${pickedDisp}</span></div>
                    </div>
                `;
            });
        } else {
            wrongContainer.classList.add('hidden');
        }

        const formData = `action=saveScore&studentName=${encodeURIComponent(studentName)}&subjectDay=${encodeURIComponent(subjectType + " Day " + selectedDay)}&range=${encodeURIComponent(selectedRange)}&score=${encodeURIComponent(finalScoreText)}`;

        fetch(scriptURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        })
        .then(res => {
            document.getElementById('saving-msg').innerText = "✅ 성적이 성공적으로 저장되었습니다!";
            document.getElementById('saving-msg').style.color = "#38a169";
        })
        .catch(err => {
            document.getElementById('saving-msg').innerText = "❌ 성적 저장에 실패했습니다.";
            document.getElementById('saving-msg').style.color = "red";
        });
    }
</script>
</body>
</html>
