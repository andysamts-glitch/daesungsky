<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대성 SKY Test Center</title>
     <link rel="icon" type="image/png" href="favicon.png"> 
    <style>
        /* 기본 디자인 설정 */
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { background: white; padding: 32px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 540px; margin: 40px auto; position: relative; }
        
        .logo { width: 120px; height: auto; margin-bottom: 5px; }
        h2 { color: #1a365d; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        .contact-area { margin: 0 0 22px 0; color: #4a5568; font-size: 15px; line-height: 1.55; }
        .contact-phone { margin: 0 0 6px 0; color: #4a5568; }
        .contact-links { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; }
        .contact-link { display: inline-flex; align-items: center; justify-content: center; gap: 6px; color: #2b6cb0; text-decoration: none; font-weight: bold; }
        .homepage-link { color: #dd6b20; }
        .contact-link:hover { color: #1a365d; text-decoration: underline; }
        .link-icon { width: 17px; height: 17px; color: #2b6cb0; flex: 0 0 auto; }
        .app-link { display: inline-flex; align-items: center; justify-content: center; gap: 6px; max-width: 100%; padding: 6px 12px; border: 1px solid #cbd5e0; border-radius: 999px; background: #fff; color: #2b6cb0; text-decoration: none; font-size: 13px; font-weight: bold; line-height: 1.25; }
        .app-link:hover { background: #edf2f7; color: #1a365d; text-decoration: none; }
        .section-card { background-color: #edf2f7; padding: 18px; border-radius: 10px; margin-bottom: 16px; }
        .section-title { color: #2d3748; margin: 0 0 14px 0; font-size: 18px; }
        .calculator-wrap { text-align: center; margin: 0 0 16px 0; }
        .calculator-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; width: auto; min-width: 170px; padding: 7px 14px; font-size: 13px; border-radius: 999px; background: #4a5568; }
        .calculator-btn:hover { background: #2d3748; }
        .calculator-icon { font-size: 16px; line-height: 1; }
        .public-results-row { display: flex; justify-content: center; gap: 8px; margin-top: 8px; }
        .public-results-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; width: auto; min-width: 110px; padding: 7px 12px; font-size: 13px; border-radius: 999px; background: #2b6cb0; }
        .public-results-btn:hover { background: #1a365d; }
        .results-subheader { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 14px; }
        .results-subheader p { margin: 0; }
        .top-home-btn { width: auto; min-width: 68px; padding: 6px 10px; font-size: 12px; border-radius: 999px; background: #dd6b20; }
        .top-home-btn:hover { background: #c05621; }
        .results-table-wrap { overflow-x: auto; margin-top: 16px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .results-table { width: 100%; border-collapse: collapse; min-width: 520px; font-size: 13px; text-align: left; }
        .results-table th { background: #edf2f7; color: #2d3748; padding: 9px 8px; border-bottom: 1px solid #cbd5e0; white-space: nowrap; }
        .results-table td { padding: 9px 8px; border-bottom: 1px solid #edf2f7; color: #2d3748; }
        .results-table tr:last-child td { border-bottom: none; }
        .result-loading { margin: 18px 0; color: #4a5568; font-weight: bold; }
        
        /* 버튼 그룹: 바둑판 배열 + 스크롤 */
        .btn-group { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            max-height: 300px; 
            overflow-y: auto; 
            padding: 5px;
        }

        .full-width { grid-column: span 2; }
        .voca-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-height: none; overflow: visible; }
        .voca-half { grid-column: span 2; }
        .voca-quarter { grid-column: span 1; padding-left: 8px; padding-right: 8px; }

        button { padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 10px; background-color: #2b6cb0; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #1a365d; }
        .back-btn { background-color: #a0aec0; margin-top: 10px; }
        .back-btn:hover { background-color: #718096; }

        input[type="text"], input[type="password"] { padding: 15px; font-size: 20px; text-align: center; border: 2px solid #ccc; border-radius: 10px; width: 80%; margin: 0 auto 15px auto; display: block; }
        input[type="password"] { letter-spacing: 5px; }
        .hidden { display: none !important; }

        /* 우측 상단 선생님 로그인 버튼 디자인 */
        .admin-login-btn {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            padding: 8px 15px; 
            font-size: 14px; 
            background-color: transparent; 
            color: #718096; 
            border: 1px solid #cbd5e0; 
            border-radius: 5px; 
            cursor: pointer; 
        }
        .admin-login-btn:hover {
            background-color: #e2e8f0; 
            color: #1a365d;
        }
        @media (max-width: 520px) {
            .container { padding: 24px 18px; margin: 24px auto; }
            .contact-area { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <button class="admin-login-btn" onclick="location.href='admin.html'">👨‍🏫 선생님 로그인</button>

    <div class="container">
        <img src="작은로고.jpg" alt="대성 SKY 학원 로고" class="logo">
        
        <div class="contact-area">
            <p class="contact-phone">상담 문의: <a class="contact-link" href="tel:03-3351-3629">03-3351-3629</a></p>
            <div class="contact-links">
                <a class="contact-link homepage-link" href="https://www.daesungsky.com/" target="_blank">
                    <svg class="link-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M3 10.5L12 3l9 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M5 10v10h14V10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M10 20v-6h4v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                    학원 홈페이지 방문하기
                </a>
                <a class="app-link" href="https://apps.apple.com/jp/app/ivy-test-prep/id6759193687" target="_blank">
                    <svg class="link-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <rect x="6" y="2" width="12" height="20" rx="3" stroke="currentColor" stroke-width="2"></rect>
                        <path d="M10 18h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    </svg>
                    IVY Test Prep 토플, SAT 대성학원 앱
                </a>
            </div>
        </div>

        <div id="step1">
            <h2>대성 SKY Test Center</h2>
            
            <div class="section-card">
                <h3 class="section-title">단어 테스트</h3>
                <div class="voca-grid">
                    <button class="voca-half" onclick="location.href='voca.html?type=toefl'" style="background-color: #dd6b20;">TOEFL 단어</button>
                    <button class="voca-half" onclick="location.href='voca.html?type=toeic'" style="background-color: #3182ce;">TOEIC 단어</button>
                    <button class="voca-half" onclick="location.href='voca.html?type=SAT'" style="background-color: #38a169;">SAT 단어</button>
                    <button class="voca-quarter" onclick="location.href='voca.html?type=교과서_중등'" style="background-color: #805ad5;">중등</button>
                    <button class="voca-quarter" onclick="location.href='voca.html?type=교과서_고등'" style="background-color: #6b46c1;">고등</button>
                </div>
            </div>

            <div class="section-card">
                <h3 class="section-title">내신 / 모의고사</h3>
                <div class="btn-group" id="category-btns">
                    <p style="grid-column: span 2;">데이터를 불러오는 중입니다... ⏳</p>
                </div>
            </div>

            <div class="calculator-wrap">
                <button class="calculator-btn" onclick="location.href='grade.html'"><span class="calculator-icon" aria-hidden="true">∑</span> 내 평균·평점 계산</button>
                <div class="public-results-row">
                    <button class="public-results-btn" onclick="showPublicResults('score')">결과-단어</button>
                    <button class="public-results-btn" onclick="showPublicResults('test')">결과-Test</button>
                </div>
            </div>
        </div>

        <div id="public-results-screen" class="hidden">
            <h2 id="public-results-title">전체 학생 결과</h2>
            <div class="results-subheader">
                <p id="public-results-desc">최근 결과입니다.</p>
                <button class="top-home-btn" onclick="goBack('public-results-screen', 'step1')">홈으로</button>
            </div>
            <div id="public-results-area" class="result-loading">결과를 불러오는 중입니다...</div>
            <button class="back-btn full-width" style="width: 100%;" onclick="goBack('public-results-screen', 'step1')">돌아가기</button>
        </div>

        <div id="step2" class="hidden">
            <h2>학년/시험 선택</h2>
            <p id="category-title">선택한 분류: -</p>
            <div class="btn-group" id="grade-btns"></div>
            <button class="back-btn full-width" onclick="goBack('step2', 'step1')">돌아가기</button>
        </div>

        <div id="step3" class="hidden">
            <h2>과목 선택</h2>
            <p id="grade-title">선택한 학년/시험: -</p>
            <div class="btn-group" id="subject-btns"></div>
            <button class="back-btn full-width" onclick="goBackFromStep3()">돌아가기</button>
        </div>

        <div id="step4" class="hidden">
            <h2>문제 선택</h2>
            <p id="subject-title">선택한 과목: -</p>
            <div class="btn-group" id="problem-btns"></div>
            <button class="back-btn full-width" onclick="goBack('step4', 'step3')">돌아가기</button>
        </div>

        <div id="step5" class="hidden">
            <h2>접속 암호</h2>
            <p id="problem-title">선택한 문제: -</p>
            <input type="text" id="student-name" placeholder="학생 이름">
            <input type="password" id="password-input" placeholder="4자리 암호" maxlength="4">
            <button class="full-width" style="width: 100%; margin-bottom: 10px;" onclick="checkPassword()">문제 풀기 시작</button>
            <button class="back-btn full-width" style="width: 100%;" onclick="goBack('step5', 'step4')">돌아가기</button>
        </div>
    </div>

    <script>
        // 
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxLRohgJOLdKADjTIj_BVPrKtZb2LuQCK_qOQjkqfJFSmvEWgjKIqyFkphxbkAopSWyVw/exec';

        let db = {}; 
        let passwordDB = {}; 
        let selectedCategory = "";
        let selectedGrade = "";
        let selectedSubject = "";
        let selectedProblem = "";
        let step3BackTarget = "step2";

        const gradeGroups = [
            { name: "중등", grades: ["중1", "중2", "중3"] },
            { name: "고등", grades: ["고1", "고2", "고3"] },
            { name: "TOEFL", grades: ["TOEFL"] },
            { name: "SAT", grades: ["SAT"] }
        ];

        window.onload = function() {
            const categoryDiv = document.getElementById('category-btns');
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);

            fetch(`${scriptURL}?t=${Date.now()}`, { signal: controller.signal, cache: "no-store" })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (!Array.isArray(data)) {
                    throw new Error("Invalid data");
                }
                categoryDiv.innerHTML = ""; 
                
                data.forEach(item => {
                    if (!db[item.grade]) db[item.grade] = {};
                    if (!db[item.grade][item.subject]) db[item.grade][item.subject] = [];
                    
                    if (!db[item.grade][item.subject].includes(item.set)) {
                        db[item.grade][item.subject].push(item.set);
                    }
                    
                    const key = `${item.grade}-${item.subject}-${item.set}`;
                    passwordDB[key] = item.password;
                });

                renderCategoryButtons();
            })
            .catch(error => {
                categoryDiv.innerHTML = "<p style='grid-column: span 2; color: red; margin-bottom: 8px;'>데이터를 불러오지 못했습니다.</p><button class='full-width' onclick='location.reload()'>다시 불러오기</button>";
            })
            .finally(() => {
                clearTimeout(timeoutId);
            });
        }

        function renderCategoryButtons() {
            const categoryDiv = document.getElementById('category-btns');
            categoryDiv.innerHTML = "";

            let hasData = false;
            gradeGroups.forEach(group => {
                const availableGrades = group.grades.filter(grade => db[grade]);
                if (availableGrades.length > 0) {
                    hasData = true;
                    categoryDiv.innerHTML += `<button onclick="selectCategory('${group.name}')">${group.name}</button>`;
                }
            });

            const groupedGrades = gradeGroups.flatMap(group => group.grades);
            const extraGrades = Object.keys(db).filter(grade => !groupedGrades.includes(grade));
            if (extraGrades.length > 0) {
                hasData = true;
                categoryDiv.innerHTML += `<button onclick="selectCategory('기타')">기타</button>`;
            }

            if(!hasData) {
                categoryDiv.innerHTML = "<p style='grid-column: span 2;'>아직 등록된 문제가 없습니다.</p>";
            }
        }

        function selectCategory(category) {
            selectedCategory = category;
            const directGroup = gradeGroups.find(item => item.name === category && item.grades.length === 1);
            if (directGroup) {
                selectGrade(directGroup.grades[0], 'step1');
                return;
            }

            document.getElementById('category-title').innerText = "선택한 분류: " + category;
            const gradeDiv = document.getElementById('grade-btns');
            gradeDiv.innerHTML = "";

            const group = gradeGroups.find(item => item.name === category);
            const grades = group
                ? group.grades.filter(grade => db[grade])
                : Object.keys(db).filter(grade => !gradeGroups.flatMap(item => item.grades).includes(grade));

            grades.forEach(grade => {
                gradeDiv.innerHTML += `<button onclick="selectGrade('${grade}')">${grade}</button>`;
            });

            changeScreen('step1', 'step2');
        }

        function selectGrade(grade, fromStep = 'step2') {
            selectedGrade = grade;
            step3BackTarget = fromStep;
            document.getElementById('grade-title').innerText = "선택한 학년/시험: " + grade;
            const subjectDiv = document.getElementById('subject-btns');
            subjectDiv.innerHTML = ""; 
            for (let subject in db[grade]) {
                subjectDiv.innerHTML += `<button onclick="selectSubject('${subject}')">${subject}</button>`;
            }
            changeScreen(fromStep, 'step3');
        }

        function selectSubject(subject) {
            selectedSubject = subject;
            document.getElementById('subject-title').innerText = "선택한 과목: " + subject;
            const problemDiv = document.getElementById('problem-btns');
            problemDiv.innerHTML = ""; 
            
            let problems = db[selectedGrade][subject];
            for (let i = 0; i < problems.length; i++) {
                problemDiv.innerHTML += `<button onclick="selectProblem('${problems[i]}')">${problems[i]}</button>`;
            }
            changeScreen('step3', 'step4');
        }

        function selectProblem(problem) {
            selectedProblem = problem;
            document.getElementById('problem-title').innerText = "선택한 문제: " + problem;
            changeScreen('step4', 'step5');
        }

        function changeScreen(hideId, showId) {
            document.getElementById(hideId).classList.add('hidden');
            document.getElementById(showId).classList.remove('hidden');
        }
        
        function goBack(hideId, showId) {
            changeScreen(hideId, showId);
            document.getElementById('password-input').value = ""; 
        }

        function goBackFromStep3() {
            goBack('step3', step3BackTarget || 'step2');
        }

        function checkPassword() {
            const studentName = document.getElementById('student-name').value.trim();
            const pwd = document.getElementById('password-input').value;
            const key = `${selectedGrade}-${selectedSubject}-${selectedProblem}`;
            const realPassword = passwordDB[key]; 

            if(!studentName) {
                alert("학생 이름을 입력해 주세요!");
                document.getElementById('student-name').focus();
                return;
            }

            if(pwd === realPassword) {
                const params = new URLSearchParams({
                    problem: selectedProblem,
                    student: studentName,
                    grade: selectedGrade,
                    subject: selectedSubject
                });
                sessionStorage.setItem('dsskyQuizAccess', JSON.stringify({
                    problem: selectedProblem,
                    student: studentName,
                    grade: selectedGrade,
                    subject: selectedSubject,
                    createdAt: Date.now()
                }));
                window.location.href = "quiz.html?" + params.toString();
            } else {
                alert("암호가 틀렸습니다. 다시 확인해 주세요!");
            }
        }

        function showPublicResults(kind) {
            changeScreen('step1', 'public-results-screen');
            const area = document.getElementById('public-results-area');
            const title = document.getElementById('public-results-title');
            const desc = document.getElementById('public-results-desc');
            const isScore = kind === 'score';
            const action = isScore ? 'getPublicScoreResults' : 'getPublicTestResults';
            const expectedType = isScore ? 'publicScoreResults' : 'publicTestResults';

            title.innerText = isScore ? '결과-단어' : '결과-Test';
            desc.innerText = isScore ? '최근 단어 테스트 결과입니다.' : '최근 내신 / 모의고사 풀이 결과입니다.';
            area.className = 'result-loading';
            area.innerHTML = '결과를 불러오는 중입니다...';

            fetch(`${scriptURL}?action=${action}&limit=100&t=${Date.now()}`, { cache: "no-store" })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (!data || data.type !== expectedType || !Array.isArray(data.rows)) {
                    throw new Error("Invalid data");
                }

                const rows = data.rows;

                if (rows.length === 0) {
                    area.className = 'result-loading';
                    area.innerHTML = '아직 표시할 결과가 없습니다.';
                    return;
                }

                area.className = 'results-table-wrap';
                area.innerHTML = isScore ? renderScoreResultsTable(rows) : renderTestResultsTable(rows);
            })
            .catch(error => {
                area.className = 'result-loading';
                area.innerHTML = "결과를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.";
            });
        }

        function renderScoreResultsTable(rows) {
            return `
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>이름</th>
                            <th>단어</th>
                            <th>범위</th>
                            <th>결과</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.map(item => `
                            <tr>
                                <td>${escapeHtml(item.date)}</td>
                                <td>${escapeHtml(item.studentName)}</td>
                                <td>${escapeHtml(item.subjectDay)}</td>
                                <td>${escapeHtml(item.range)}</td>
                                <td>${escapeHtml(item.score)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderTestResultsTable(rows) {
            return `
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th>날짜</th>
                                <th>이름</th>
                                <th>학년</th>
                                <th>과목</th>
                                <th>문제</th>
                                <th>결과</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows.map(item => `
                                <tr>
                                    <td>${escapeHtml(item.date)}</td>
                                    <td>${escapeHtml(item.studentName)}</td>
                                    <td>${escapeHtml(item.grade)}</td>
                                    <td>${escapeHtml(item.subject)}</td>
                                    <td>${escapeHtml(item.problemSet)}</td>
                                    <td>${escapeHtml(item.score)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
