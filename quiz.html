<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제 풀이</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 20px; }
        
        /* 레이아웃 (페세지가 있을 때와 없을 때 자동 변경) */
        .layout-container { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
        .passage-box { flex: 1; min-width: 300px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); line-height: 1.6; font-size: 16px; overflow-y: auto; max-height: 70vh; } #passage-text {
    white-space: pre-wrap;
}
        .quiz-box { flex: 1; min-width: 300px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* 🌟 페세지가 없을 때 퀴즈 박스를 예쁘게 중앙으로 모아주는 마법! */
        .no-passage { max-width: 600px; margin: 0 auto; flex: none; width: 100%; }

        h2 { color: #1a365d; margin-top: 0; }
        .progress { text-align: right; font-weight: bold; color: #718096; margin-bottom: 15px; }
        .question-text { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #2b6cb0; line-height: 1.4; }
        
        /* 객관식 보기 버튼 */
        .option-btn { width: 100%; padding: 15px; font-size: 16px; background-color: white; color: #2d3748; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; text-align: left; cursor: pointer; transition: 0.2s; }
        .option-btn:hover { background-color: #edf2f7; border-color: #cbd5e0; }
        .option-btn.correct { background-color: #c6f6d5 !important; border-color: #38a169 !important; color: #22543d; }
        .option-btn.wrong { background-color: #fed7d7 !important; border-color: #e53e3e !important; color: #822727; }

        /* 주관식 입력창 */
        input[type="text"] { width: 100%; padding: 15px; font-size: 16px; margin-bottom: 15px; border: 2px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background-color: #2b6cb0; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .submit-btn:hover { background-color: #1a365d; }
        
        /* 🌟 정답 보기 버튼 (주관식용) */
        .hint-btn { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; background-color: #ecc94b; color: #744210; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        .hint-btn:hover { background-color: #d69e2e; }

        .hidden { display: none !important; }
        
        /* 모바일 세로 모드 대응 */
        @media (max-width: 768px) {
            .layout-container { flex-direction: column; }
            .passage-box { max-height: 40vh; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1 id="test-title">문제 풀이</h1>
</div>

<div id="loading" style="text-align: center; font-size: 20px; margin-top: 50px;">데이터를 불러오는 중입니다... ⏳</div>

<div id="main-layout" class="layout-container hidden">
    <div id="passage-container" class="passage-box">
        <h2>📖 지문</h2>
        <div id="passage-text"></div>
    </div>

    <div id="quiz-container" class="quiz-box">
        <div class="progress" id="progress-text">1 / ?</div>
        <div class="question-text" id="question-text">문제 내용</div>
        
        <div id="options-area"></div>
        
        <div id="subjective-area" class="hidden">
            <input type="text" id="subjective-input" placeholder="정답을 입력하세요" onkeypress="if(event.key==='Enter') checkSubjective()">
            <button class="submit-btn" onclick="checkSubjective()">정답 확인</button>
            <button class="hint-btn" onclick="showAnswer()">💡 답을 모르겠어요 (정답 보기)</button>
        </div>
        
        <div id="feedback" style="text-align: center; height: 30px; font-weight: bold; margin-top: 15px; font-size: 18px;"></div>
    </div>
</div>

<div id="result-screen" class="hidden" style="max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <h2>수고하셨습니다! 🎉</h2>
    <p style="font-size: 20px; color: #4a5568;">모든 문제를 완료했습니다.</p>
    <button class="submit-btn" style="margin-top: 20px;" onclick="location.href='index.html'">첫 화면으로 돌아가기</button>
</div>

<script>
    // 🌟 선생님의 고유 스크립트 주소
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzxJ085RNS9FsBUGAjwtVJsAswTqT7ZzV4qy5-mPjygedrWAY634Nq6eDt7XZYo4fYxIA/exec';
    
    let quizData = [];
    let currentIndex = 0;

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const problemSet = urlParams.get('problem');
        
        if(!problemSet) {
            alert("잘못된 접근입니다.");
            location.href = "index.html";
            return;
        }

        document.getElementById('test-title').innerText = problemSet + " 풀이";

        fetch(`${scriptURL}?action=getQuiz&set=${encodeURIComponent(problemSet)}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main-layout').classList.remove('hidden');

            // 🌟 페세지 유무에 따른 화면 자동 변환 핵심 로직!
            if (!data.passage || data.passage.trim() === "") {
                document.getElementById('passage-container').classList.add('hidden');
                document.getElementById('quiz-container').classList.add('no-passage'); // 중앙 정렬 클래스 추가
            } else {
                document.getElementById('passage-text').textContent = data.passage;
            }

            quizData = data.questions;
            
            if(quizData.length === 0) {
                alert("등록된 문제가 없습니다.");
                location.href = "index.html";
            } else {
                renderQuiz();
            }
        })
        .catch(err => {
            document.getElementById('loading').innerText = "데이터를 불러오는 데 실패했습니다. 새로고침 해주세요.";
        });
    };

    function renderQuiz() {
        const q = quizData[currentIndex];
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = `Q. ${q.question}`;
        document.getElementById('feedback').innerText = "";
        
        const optionsArea = document.getElementById('options-area');
        const subjectiveArea = document.getElementById('subjective-area');
        const subjectiveInput = document.getElementById('subjective-input');
        
        optionsArea.innerHTML = "";
        
        // 객관식인지 주관식인지 판별 (보기1이 있으면 객관식)
        if(q.c1 && q.c1.trim() !== "") {
            optionsArea.classList.remove('hidden');
            subjectiveArea.classList.add('hidden');
            
            let options = [
                { text: q.c1, isCorrect: (q.c1 == q.answer) },
                { text: q.c2, isCorrect: (q.c2 == q.answer) },
                { text: q.c3, isCorrect: (q.c3 == q.answer) },
                { text: q.c4, isCorrect: (q.c4 == q.answer) }
            ];
            
            // 정답란에 1, 2, 3, 4 번호만 적어두었을 때의 예외 처리
            if(q.answer == "1") options[0].isCorrect = true;
            if(q.answer == "2") options[1].isCorrect = true;
            if(q.answer == "3") options[2].isCorrect = true;
            if(q.answer == "4") options[3].isCorrect = true;

            options.forEach(opt => {
                if(opt.text && opt.text.trim() !== "undefined" && opt.text.trim() !== "") {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt.text;
                    btn.onclick = () => checkObjective(btn, opt.isCorrect);
                    optionsArea.appendChild(btn);
                }
            });
        } else {
            // 주관식
            optionsArea.classList.add('hidden');
            subjectiveArea.classList.remove('hidden');
            subjectiveInput.value = "";
            subjectiveInput.disabled = false;
            subjectiveInput.focus();
        }
    }

    function checkObjective(btn, isCorrect) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        const feedback = document.getElementById('feedback');

        if(isCorrect) {
            btn.classList.add('correct');
            feedback.innerText = "정답입니다! ⭕";
            feedback.style.color = "#38a169";
            setTimeout(nextQuestion, 1000);
        } else {
            btn.classList.add('wrong');
            feedback.innerText = "오답입니다! 다시 풀어보세요 ❌";
            feedback.style.color = "#e53e3e";
            // 객관식은 틀리면 1.5초 뒤에 다시 고를 수 있게 풀어줍니다.
            setTimeout(() => {
                buttons.forEach(b => b.disabled = false);
                btn.classList.remove('wrong');
                feedback.innerText = "";
            }, 1500);
        }
    }

    function checkSubjective() {
        const input = document.getElementById('subjective-input');
        const feedback = document.getElementById('feedback');
        
        // 띄어쓰기나 대소문자 때문에 틀리지 않도록 보정
        const userAnswer = input.value.trim().toLowerCase();
        const correctAnswer = String(quizData[currentIndex].answer).trim().toLowerCase();

        if(userAnswer === correctAnswer) {
            input.disabled = true;
            feedback.innerText = "정답입니다! ⭕";
            feedback.style.color = "#38a169";
            setTimeout(nextQuestion, 1000);
        } else {
            feedback.innerText = "오답입니다! 다시 확인해 보세요 ❌";
            feedback.style.color = "#e53e3e";
        }
    }

    // 🌟 주관식 정답 보기 힌트 버튼!
    function showAnswer() {
        const input = document.getElementById('subjective-input');
        const correctAnswer = String(quizData[currentIndex].answer).trim();
        
        input.value = correctAnswer; // 빈칸에 진짜 정답을 적어줍니다.
        
        const feedback = document.getElementById('feedback');
        feedback.innerText = "💡 정답을 확인했습니다. [정답 확인]을 누르세요.";
        feedback.style.color = "#d69e2e";
    }

    function nextQuestion() {
        currentIndex++;
        if(currentIndex < quizData.length) {
            renderQuiz();
        } else {
            document.getElementById('main-layout').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
        }
    }
</script>
</body>
</html>
