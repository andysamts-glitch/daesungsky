<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제 풀이</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 14px; }
        .header h1 { margin: 0 0 6px 0; font-size: 20px; line-height: 1.2; }
        
        /* 레이아웃 (페세지가 있을 때와 없을 때 자동 변경) */
        .layout-container { display: grid; grid-template-columns: minmax(0, 1.25fr) minmax(0, 1fr); align-items: stretch; gap: 20px; max-width: 1280px; height: calc(100svh - 145px); min-height: 520px; margin: 0 auto; }
        .passage-box { min-width: 0; min-height: 0; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); line-height: 1.8; font-size: 18px; overflow-y: auto; }
        .passage-paragraph { margin-bottom: 18px; text-align: left; }
        .passage-paragraph:last-child { margin-bottom: 0; }
        .passage-title { font-size: 20px; font-weight: bold; color: #1a365d; margin-bottom: 18px; text-align: left; line-height: 1.5; }
        .paragraph-number { display: inline-block; color: #2b6cb0; font-weight: bold; margin-right: 8px; user-select: none; }
        .paragraph-body { white-space: pre-wrap; }
        mark { background-color: #e9edf3; padding: 0 2px; border-radius: 3px; }
        .quiz-box { min-width: 0; min-height: 0; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow-y: auto; }
        
        /* 🌟 페세지가 없을 때 퀴즈 박스를 예쁘게 중앙으로 모아주는 마법! */
        .no-passage { grid-column: 1 / -1; justify-self: center; max-width: 600px; width: 100%; }

        h2 { color: #1a365d; margin-top: 0; }
        .progress { text-align: right; font-weight: bold; color: #718096; margin-bottom: 15px; }
        .question-text { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #2b6cb0; line-height: 1.4; }
        
        /* 객관식 보기 버튼 */
        .option-btn { width: 100%; padding: 15px; font-size: 17px; line-height: 1.45; background-color: white; color: #2d3748; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; text-align: left; cursor: pointer; transition: 0.2s; }
        .option-btn:hover { background-color: #edf2f7; border-color: #cbd5e0; }
        .option-btn.correct { background-color: #c6f6d5 !important; border-color: #38a169 !important; color: #22543d; }
        .option-btn.wrong { background-color: #fed7d7 !important; border-color: #e53e3e !important; color: #822727; }

        /* 주관식 입력창 */
        input[type="text"] { width: 100%; padding: 15px; font-size: 16px; margin-bottom: 15px; border: 2px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background-color: #2b6cb0; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .submit-btn:hover { background-color: #1a365d; }
        .home-btn { width: auto; min-width: 78px; padding: 7px 10px; font-size: 11px; font-weight: bold; background-color: #ed8936; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .home-btn:hover { background-color: #dd6b20; }
        .feedback-message { text-align: center; min-height: 26px; font-weight: bold; margin-top: 10px; font-size: 17px; line-height: 1.35; }
        .wrong-feedback-title { color: #e53e3e; line-height: 1.25; }
        .wrong-feedback-explanation { color: #2d3748; font-weight: 600; line-height: 1.35; margin-top: 3px; }
        
        /* 🌟 정답 보기 버튼 (주관식용) */
        .hint-btn { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; background-color: #ecc94b; color: #744210; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        .hint-btn:hover { background-color: #d69e2e; }

        .hidden { display: none !important; }
        
        /* 모바일 세로 모드 대응 */
        @media (max-width: 768px) and (orientation: portrait) {
            body { padding: 12px; }
            .header { margin-bottom: 10px; }
            .header h1 { font-size: 16px; margin-bottom: 5px; }
            .layout-container { display: flex; flex-direction: column; height: auto; min-height: 0; }
            .passage-box, .quiz-box { min-width: 0; width: auto; overflow-y: visible; }
            .passage-box { max-height: 46svh; overflow-y: auto; }
            .feedback-message { margin-top: 8px; font-size: 16px; line-height: 1.3; }
        }

        @media (orientation: landscape) and (max-height: 520px) {
            body { padding: 12px; }
            .header { margin-bottom: 8px; }
            .header h1 { margin: 0 0 5px 0; font-size: 16px; }
            .layout-container { height: calc(100svh - 62px); min-height: 0; }
            .passage-box, .quiz-box { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1 id="test-title">문제 풀이</h1>
    <button id="home-btn" class="home-btn hidden" onclick="goHome()">홈으로</button>
</div>

<div id="loading" style="text-align: center; font-size: 20px; margin-top: 50px;">데이터를 불러오는 중입니다... ⏳</div>

<div id="main-layout" class="layout-container hidden">
    <div id="passage-container" class="passage-box">
        <h2>📖 지문</h2>
        <div id="passage-text"></div>
    </div>

    <div id="quiz-container" class="quiz-box">
        <div class="progress" id="progress-text">1 / ?</div>
        <div class="question-text" id="question-text">문제 내용</div>
        
        <div id="options-area"></div>
        
        <div id="subjective-area" class="hidden">
            <input type="text" id="subjective-input" placeholder="정답을 입력하세요" onkeypress="if(event.key==='Enter') checkSubjective()">
            <button class="submit-btn" onclick="checkSubjective()">정답 제출</button>
        </div>
        
        <div id="feedback" class="feedback-message"></div>
        <button id="next-question-btn" class="submit-btn hidden" style="margin-top: 10px;" onclick="nextQuestion()">다음 문제</button>
    </div>
</div>

<div id="result-screen" class="hidden" style="max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <h2>수고하셨습니다! 🎉</h2>
    <p style="font-size: 20px; color: #4a5568;">모든 문제를 완료했습니다.</p>
    <p id="score-text" style="font-size: 22px; color: #1a365d; font-weight: bold;"></p>
    <p id="saving-msg" style="color: #3182ce; font-weight: bold;">완료 기록을 서버에 전송하고 있습니다... ⏳</p>
    <button class="submit-btn" style="margin-top: 20px;" onclick="location.href='index.html'">첫 화면으로 돌아가기</button>
</div>

<script>
    // 🌟 선생님의 고유 스크립트 주소
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxLRohgJOLdKADjTIj_BVPrKtZb2LuQCK_qOQjkqfJFSmvEWgjKIqyFkphxbkAopSWyVw/exec';
    
    let quizData = [];
    let currentIndex = 0;
    let problemSet = "";
    let studentName = "";
    let selectedGrade = "";
    let selectedSubject = "";
    let testSaved = false;

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        problemSet = urlParams.get('problem') || "";
        studentName = urlParams.get('student') || "";
        selectedGrade = urlParams.get('grade') || "";
        selectedSubject = urlParams.get('subject') || "";
        
        if(!problemSet) {
            alert("잘못된 접근입니다.");
            location.href = "index.html";
            return;
        }

        if(!studentName) {
            alert("학생 이름이 없습니다. 첫 화면에서 다시 시작해 주세요.");
            location.href = "index.html";
            return;
        }

        if(!hasValidQuizAccess()) {
            alert("첫 화면에서 이름과 암호를 입력한 뒤 시작해 주세요.");
            location.href = "index.html";
            return;
        }

        document.getElementById('test-title').innerText = problemSet + " 풀이";

        fetch(`${scriptURL}?action=getQuiz&set=${encodeURIComponent(problemSet)}&grade=${encodeURIComponent(selectedGrade)}&subject=${encodeURIComponent(selectedSubject)}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main-layout').classList.remove('hidden');
            document.getElementById('home-btn').classList.remove('hidden');

            // 🌟 페세지 유무에 따른 화면 자동 변환 핵심 로직!
            if (!data.passage || data.passage.trim() === "") {
                document.getElementById('passage-container').classList.add('hidden');
                document.getElementById('quiz-container').classList.add('no-passage'); // 중앙 정렬 클래스 추가
            } else {
                renderPassage(data.passage);
            }

            quizData = data.questions;
            
            if(quizData.length === 0) {
                alert("등록된 문제가 없습니다.");
                location.href = "index.html";
            } else {
                renderQuiz();
            }
        })
        .catch(err => {
            document.getElementById('loading').innerText = "데이터를 불러오는 데 실패했습니다. 새로고침 해주세요.";
        });
    };

    function hasValidQuizAccess() {
        try {
            const rawAccess = sessionStorage.getItem('dsskyQuizAccess');
            if(!rawAccess) return false;

            const access = JSON.parse(rawAccess);
            const expiresInMs = 3 * 60 * 60 * 1000;
            const isFresh = Date.now() - Number(access.createdAt || 0) <= expiresInMs;

            return isFresh
                && access.problem === problemSet
                && access.student === studentName
                && access.grade === selectedGrade
                && access.subject === selectedSubject;
        } catch (error) {
            return false;
        }
    }

    function renderPassage(passage) {
        const passageText = document.getElementById('passage-text');
        const normalized = String(passage || "").replace(/\r\n/g, "\n").trim();
        const rawParagraphs = normalized.split(/\n\s*\n|\n/);
        const paragraphs = rawParagraphs.map(p => p.trim()).filter(Boolean);

        passageText.innerHTML = "";

        let paragraphNumber = 1;

        paragraphs.forEach((paragraph, index) => {
            if (isPassageTitle(paragraph, index, paragraphs.length)) {
                const titleEl = document.createElement('div');
                titleEl.className = 'passage-title';
                titleEl.innerHTML = formatPassageMarkup(paragraph.replace(/^#\s*/, ''));
                passageText.appendChild(titleEl);
                paragraphNumber = 1;
                return;
            }

            const row = document.createElement('p');
            row.className = 'passage-paragraph paragraph-body';
            row.innerHTML = `<span class="paragraph-number">${paragraphNumber}.</span>${formatPassageMarkup(paragraph)}`;
            passageText.appendChild(row);
            paragraphNumber++;
        });
    }

    function isPassageTitle(paragraph, index, totalCount) {
        return paragraph.startsWith('#') || (index === 0 && totalCount > 1);
    }

    function formatPassageMarkup(text) {
        return escapeHtml(text)
            .replace(/&amp;#0*39;/gi, "'")
            .replace(/&amp;apos;/gi, "'")
            .replace(/&amp;quot;/gi, '"')
            .replace(/&amp;lt;u&amp;gt;/gi, '<u>')
            .replace(/&amp;lt;\/u&amp;gt;/gi, '</u>')
            .replace(/&amp;lt;mark&amp;gt;/gi, '<mark>')
            .replace(/&amp;lt;\/mark&amp;gt;/gi, '</mark>')
            .replace(/&lt;u&gt;/gi, '<u>')
            .replace(/&lt;\/u&gt;/gi, '</u>')
            .replace(/&lt;mark&gt;/gi, '<mark>')
            .replace(/&lt;\/mark&gt;/gi, '</mark>');
    }

    function escapeHtml(text) {
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function renderQuiz() {
        const q = quizData[currentIndex];
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = `Q. ${q.question}`;
        document.getElementById('feedback').innerText = "";
        document.getElementById('next-question-btn').classList.add('hidden');
        
        const optionsArea = document.getElementById('options-area');
        const subjectiveArea = document.getElementById('subjective-area');
        const subjectiveInput = document.getElementById('subjective-input');
        
        optionsArea.innerHTML = "";
        
        // 객관식인지 주관식인지 판별 (보기1이 있으면 객관식)
        if(q.c1 && q.c1.trim() !== "") {
            optionsArea.classList.remove('hidden');
            subjectiveArea.classList.add('hidden');
            
            let options = [
                { text: q.c1, isCorrect: (q.c1 == q.answer) },
                { text: q.c2, isCorrect: (q.c2 == q.answer) },
                { text: q.c3, isCorrect: (q.c3 == q.answer) },
                { text: q.c4, isCorrect: (q.c4 == q.answer) }
            ];
            
            // 정답란에 1, 2, 3, 4 번호만 적어두었을 때의 예외 처리
            if(q.answer == "1") options[0].isCorrect = true;
            if(q.answer == "2") options[1].isCorrect = true;
            if(q.answer == "3") options[2].isCorrect = true;
            if(q.answer == "4") options[3].isCorrect = true;

            options.forEach(opt => {
                if(opt.text && opt.text.trim() !== "undefined" && opt.text.trim() !== "") {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt.text;
                    btn.dataset.correct = opt.isCorrect ? "true" : "false";
                    btn.onclick = () => checkObjective(btn, opt.isCorrect);
                    optionsArea.appendChild(btn);
                }
            });
        } else {
            // 주관식
            optionsArea.classList.add('hidden');
            subjectiveArea.classList.remove('hidden');
            subjectiveInput.value = "";
            subjectiveInput.disabled = false;
            subjectiveArea.querySelectorAll('button').forEach(btn => btn.disabled = false);
            subjectiveInput.focus();
        }
    }

    function checkObjective(btn, isCorrect) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        const feedback = document.getElementById('feedback');

        if(isCorrect) {
            recordCurrentAnswer(true);
            btn.classList.add('correct');
            feedback.innerText = "정답입니다! ⭕";
            feedback.style.color = "#38a169";
            document.getElementById('next-question-btn').classList.remove('hidden');
        } else {
            recordCurrentAnswer(false);
            btn.classList.add('wrong');
            buttons.forEach(b => {
                if(b.dataset.correct === "true") b.classList.add('correct');
            });
            showWrongFeedback();
            document.getElementById('next-question-btn').classList.remove('hidden');
        }
    }

    function checkSubjective() {
        const input = document.getElementById('subjective-input');
        const feedback = document.getElementById('feedback');
        
        // 띄어쓰기나 대소문자 때문에 틀리지 않도록 보정
        const userAnswer = input.value.trim();
        const correctAnswer = String(quizData[currentIndex].answer).trim();

        if(isSubjectiveAnswerCorrect(userAnswer, correctAnswer)) {
            recordCurrentAnswer(true);
            input.disabled = true;
            document.querySelectorAll('#subjective-area button').forEach(btn => btn.disabled = true);
            feedback.innerText = "정답입니다! ⭕";
            feedback.style.color = "#38a169";
            document.getElementById('next-question-btn').classList.remove('hidden');
        } else {
            recordCurrentAnswer(false);
            input.disabled = true;
            document.querySelectorAll('#subjective-area button').forEach(btn => btn.disabled = true);
            showWrongFeedback();
            document.getElementById('next-question-btn').classList.remove('hidden');
        }
    }

    function isSubjectiveAnswerCorrect(userAnswer, correctAnswer) {
        const normalizedCorrect = normalizeAnswerText(correctAnswer);
        const normalizedUser = normalizeAnswerText(userAnswer);

        if (!normalizedCorrect) return normalizedUser === normalizedCorrect;

        if (correctAnswer.includes('/')) {
            const correctParts = splitOrderedAnswer(correctAnswer);
            const userParts = splitOrderedAnswer(userAnswer);

            if (correctParts.length !== userParts.length) return false;

            return correctParts.every((part, index) => part === userParts[index]);
        }

        return normalizedUser === normalizedCorrect;
    }

    function splitOrderedAnswer(answer) {
        return String(answer)
            .trim()
            .toLowerCase()
            .split(/\s*\/\s*|\s*,\s*|\s+/)
            .map(part => normalizeAnswerText(part))
            .filter(Boolean);
    }

    function normalizeAnswerText(answer) {
        return String(answer)
            .trim()
            .toLowerCase()
            .replace(/\s+/g, ' ');
    }

    function recordCurrentAnswer(isCorrect) {
        const q = quizData[currentIndex];
        if(q.answered) return;
        q.answered = true;
        q.userCorrect = isCorrect;
    }

    function getCorrectAnswerText() {
        const q = quizData[currentIndex];
        if(q.answer == "1") return q.c1;
        if(q.answer == "2") return q.c2;
        if(q.answer == "3") return q.c3;
        if(q.answer == "4") return q.c4;
        return String(q.answer).trim();
    }

    function showWrongFeedback() {
        const feedback = document.getElementById('feedback');
        const q = quizData[currentIndex];
        const explanation = String(q.explanation || "").trim();
        feedback.style.color = "";

        if (explanation) {
            feedback.innerHTML = `
                <div class="wrong-feedback-title">오답입니다!</div>
                <div class="wrong-feedback-explanation">${escapeHtml(explanation)}</div>
            `;
        } else {
            feedback.innerHTML = `<div class="wrong-feedback-title">오답입니다!</div>`;
        }
    }

    function getScoreCounts() {
        const correctCount = quizData.filter(q => q.userCorrect === true).length;
        const questionCount = quizData.length;
        return {
            correctCount: correctCount,
            wrongCount: questionCount - correctCount,
            questionCount: questionCount,
            scoreText: `${correctCount} / ${questionCount}`
        };
    }

    function nextQuestion() {
        currentIndex++;
        if(currentIndex < quizData.length) {
            renderQuiz();
        } else {
            const score = getScoreCounts();
            document.getElementById('main-layout').classList.add('hidden');
            document.getElementById('home-btn').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-text').innerText = `결과: ${score.questionCount}문제 중 ${score.correctCount}개 정답, ${score.wrongCount}개 오답`;
            saveTestCompletion();
        }
    }

    function goHome() {
        if (confirm("진행 중인 풀이를 끝내고 첫 화면으로 돌아갈까요?")) {
            location.href = "index.html";
        }
    }

    function saveTestCompletion() {
        if(testSaved) return;
        testSaved = true;
        const score = getScoreCounts();

        const formData = new URLSearchParams({
            action: 'saveTest',
            studentName: studentName,
            grade: selectedGrade,
            subject: selectedSubject,
            problemSet: problemSet,
            questionCount: String(score.questionCount),
            correctCount: String(score.correctCount),
            wrongCount: String(score.wrongCount),
            score: score.scoreText,
            completed: 'TRUE'
        });

        fetch(scriptURL, {
            method: 'POST',
            keepalive: true,
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString()
        })
        .then(() => {
            document.getElementById('saving-msg').innerText = "✅ 완료 기록이 저장되었습니다!";
            document.getElementById('saving-msg').style.color = "#38a169";
        })
        .catch(() => {
            testSaved = false;
            document.getElementById('saving-msg').innerText = "❌ 완료 기록 저장에 실패했습니다. 인터넷 연결 후 새로고침하지 말고 선생님께 알려주세요.";
            document.getElementById('saving-msg').style.color = "red";
        });
    }
</script>
</body>
</html>
